<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240" role="img" aria-label="Autonomous AI teams coordinating. The direction is human.">
  <style>
    .tick { animation: tick 9s ease-in-out infinite; }
    @keyframes tick {
      0%, 90%, 100% { stroke: #45545C; }
      94% { stroke: #C9D6D0; }
    }
    .ring { animation: ring 9s ease-out infinite; transform-origin: 110px 120px; }
    @keyframes ring {
      0% { opacity: 0.45; transform: scale(0.3); }
      55% { opacity: 0; transform: scale(1); }
      100% { opacity: 0; transform: scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .pulse, .ring { display: none; }
      .tick { animation: none; }
    }
  </style>

  <rect x="0.5" y="0.5" width="879" height="239" rx="12" fill="#04070C" stroke="#131C26"/>

  <!-- the seams (still). the ring + tail on the right is the 9 — let it emerge, never announce it -->
  <g fill="none" stroke="#101A23" stroke-width="1.2">
    <path d="M110,120 Q200,90 290,78"/>
    <path d="M110,120 Q200,150 290,162"/>
    <path d="M290,78 Q370,95 450,120"/>
    <path d="M290,162 Q370,145 450,120"/>
    <path d="M450,120 Q520,100 598,92"/>
    <path d="M450,120 Q530,128 616,136"/>
    <circle cx="660" cy="92" r="62"/>
    <path d="M704,136 Q718,160 710,186 Q702,206 684,214"/>
    <path d="M684,214 Q390,236 110,120"/>
  </g>

  <!-- the teams (unnamed) -->
  <g fill="#0A1118" stroke="#45545C" stroke-width="1.5">
    <circle class="tick" style="animation-delay:1.2s" cx="290" cy="78"  r="5.5"/>
    <circle class="tick" style="animation-delay:4.0s" cx="290" cy="162" r="5.5"/>
    <circle class="tick" style="animation-delay:2.4s" cx="450" cy="120" r="5.5"/>
    <circle class="tick" style="animation-delay:3.4s" cx="598" cy="92"  r="5.5"/>
    <circle class="tick" style="animation-delay:5.0s" cx="660" cy="30"  r="5.5"/>
    <circle class="tick" style="animation-delay:5.8s" cx="722" cy="92"  r="5.5"/>
    <circle class="tick" style="animation-delay:6.6s" cx="660" cy="154" r="5.5"/>
    <circle class="tick" style="animation-delay:4.7s" cx="616" cy="136" r="5.5"/>
    <circle class="tick" style="animation-delay:7.6s" cx="710" cy="186" r="5.5"/>
    <circle class="tick" style="animation-delay:8.3s" cx="684" cy="214" r="5.5"/>
  </g>

  <!-- the human (bone; the direction) -->
  <circle class="ring" cx="110" cy="120" r="24" fill="none" stroke="#E9F0EC" stroke-width="1"/>
  <circle cx="110" cy="120" r="7" fill="#04070C" stroke="#E9F0EC" stroke-width="1.8"/>

  <!-- the work (signal green; the only thing that moves — over a cycle it draws the 9) -->
  <g class="pulse">
    <circle r="3" fill="#34E5A0">
      <animateMotion dur="9s" repeatCount="indefinite"
        path="M110,120 Q200,90 290,78 Q370,95 450,120 Q520,100 598,92 A62,62 0 1 1 616,136"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#34E5A0">
      <animateMotion dur="8s" begin="3s" repeatCount="indefinite"
        path="M110,120 Q200,150 290,162 Q370,145 450,120 Q530,128 616,136 Q660,158 704,136 Q718,160 710,186 Q702,206 684,214"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="8s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#34E5A0">
      <animateMotion dur="6.5s" begin="6s" repeatCount="indefinite"
        path="M684,214 Q390,236 110,120"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.07;0.5;0.93;1" dur="6.5s" begin="6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
