<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240" role="img" aria-label="Autonomous AI teams coordinating. The direction is human.">
  <style>
    .seg { stroke: #16222C; }
    .lit { animation: seg 9s linear infinite; }
    .s1 { animation-delay: 0.00s; } .s2 { animation-delay: 0.15s; } .s3 { animation-delay: 0.30s; }
    .s4 { animation-delay: 0.45s; } .s5 { animation-delay: 0.60s; } .s6 { animation-delay: 0.75s; }
    @keyframes seg {
      0%, 37%  { stroke: #16222C; }
      40%      { stroke: #34E5A0; }
      42%, 82% { stroke: #1E7A55; }
      90%,100% { stroke: #16222C; }
    }
    .tick { animation: tick 9s linear infinite; }
    @keyframes tick {
      0%, 100% { stroke: #45545C; }
      18%      { stroke: #45545C; }
      20%      { stroke: #C9D6D0; }
      24%      { stroke: #45545C; }
    }
    @media (prefers-reduced-motion: reduce) {
      .pulse { display: none; }
      .lit { animation: none; stroke: #1E7A55; }
      .tick { animation: none; }
    }
  </style>

  <rect x="0.5" y="0.5" width="879" height="239" rx="12" fill="#04070C" stroke="#131C26"/>

  <!-- fiducials (the site's corner brackets) -->
  <g fill="none" stroke="#131C26" stroke-width="1.5">
    <path d="M28,40 L28,28 L40,28"/> <path d="M840,28 L852,28 L852,40"/>
    <path d="M852,200 L852,212 L840,212"/> <path d="M40,212 L28,212 L28,200"/>
  </g>

  <!-- the traces (orthogonal ladder, grid-aligned) -->
  <g fill="none" stroke="#111B24" stroke-width="1.5">
    <path d="M100,120 L650,120"/>
    <path d="M180,120 L180,64 L470,64 L470,120"/>
    <path d="M180,120 L180,176 L470,176 L470,120"/>
    <path d="M260,64 L260,176"/>
    <path d="M400,64 L400,176"/>
  </g>

  <!-- the teams (pads on the rails, unnamed) -->
  <g fill="#0A1118" stroke="#45545C" stroke-width="1.5">
    <circle class="tick" style="animation-delay:0.9s"  cx="260" cy="64"  r="5"/>
    <circle class="tick" style="animation-delay:1.7s"  cx="400" cy="64"  r="5"/>
    <circle class="tick" style="animation-delay:2.6s"  cx="260" cy="176" r="5"/>
    <circle class="tick" style="animation-delay:4.1s"  cx="400" cy="176" r="5"/>
    <circle class="tick" style="animation-delay:1.4s"  cx="560" cy="120" r="5"/>
  </g>

  <!-- the human (bone; the direction) -->
  <circle cx="100" cy="120" r="7" fill="#04070C" stroke="#E9F0EC" stroke-width="1.8"/>

  <!-- the 9 (seven-segment; written by the work each cycle) -->
  <g class="seg" fill="none" stroke-width="5" stroke-linecap="round">
    <path class="lit s1" d="M660,114 L660,50"/>   <!-- F -->
    <path class="lit s2" d="M666,44 L750,44"/>    <!-- A -->
    <path class="lit s3" d="M756,50 L756,114"/>   <!-- B -->
    <path class="lit s4" d="M750,120 L666,120"/>  <!-- G -->
    <path class="lit s5" d="M756,126 L756,190"/>  <!-- C -->
    <path class="lit s6" d="M750,196 L666,196"/>  <!-- D -->
  </g>

  <!-- the work (one clock; packets originate everywhere; right angles only) -->
  <g class="pulse">
    <!-- human -> digit (the directive) -->
    <circle r="3" fill="#34E5A0">
      <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear"
        keyPoints="0;1;1" keyTimes="0;0.24;1" path="M100,120 L650,120"/>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.23;0.25;1" dur="9s" repeatCount="indefinite"/>
    </circle>
    <!-- team (top rail) -> digit -->
    <circle r="3" fill="#34E5A0">
      <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear"
        keyPoints="0;0;1;1" keyTimes="0;0.05;0.30;1" path="M260,64 L470,64 L470,120 L650,120"/>
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.06;0.29;0.31;1" dur="9s" repeatCount="indefinite"/>
    </circle>
    <!-- team -> team (peer assignment, bottom to top) -->
    <circle r="3" fill="#34E5A0">
      <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear"
        keyPoints="0;0;1;1" keyTimes="0;0.10;0.34;1" path="M400,176 L260,176 L260,64"/>
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.11;0.33;0.35;1" dur="9s" repeatCount="indefinite"/>
    </circle>
    <!-- team -> team (mid rail to bottom, after the write) -->
    <circle r="3" fill="#34E5A0">
      <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear"
        keyPoints="0;0;1;1" keyTimes="0;0.42;0.62;1" path="M560,120 L470,120 L470,176 L400,176"/>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.42;0.44;0.61;0.63;1" dur="9s" repeatCount="indefinite"/>
    </circle>
    <!-- team -> team (top cross-rail drop) -->
    <circle r="3" fill="#34E5A0">
      <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear"
        keyPoints="0;0;1;1" keyTimes="0;0.55;0.72;1" path="M400,64 L400,176"/>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.55;0.57;0.71;0.73;1" dur="9s" repeatCount="indefinite"/>
    </circle>
    <!-- team -> human (work returns for signature) -->
    <circle r="3" fill="#34E5A0">
      <animateMotion dur="9s" repeatCount="indefinite" calcMode="linear"
        keyPoints="0;0;1;1" keyTimes="0;0.66;0.90;1" path="M260,176 L180,176 L180,120 L100,120"/>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.66;0.68;0.89;0.91;1" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
